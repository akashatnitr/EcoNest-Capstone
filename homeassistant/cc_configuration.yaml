views:
  - type: sections
    title: Control Center
    max_columns: 4
    header: {}
    cards: []
    badges: []
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Security
            heading_style: title
            icon: mdi:shield-home
            grid_options:
              rows: 1
          - type: heading
            heading: Garage Doors
            heading_style: subtitle
          - type: custom:button-card
            entity: cover.garage12
            name: Double Door Garage
            icon: mdi:garage
            show_label: true
            label: >-
              [[[ return entity.state === 'open' ? 'Open' : entity.state ===
              'opening' ? 'Opening' : entity.state === 'closing' ? 'Closing' :
              'Closed' ]]]
            layout: icon_label_card
            tap_action:
              action: toggle
            styles:
              card:
                - background: >-
                    [[[ return entity.state === 'open' ? '#f5f5f5' : '#1e1e1e'
                    ]]]
                - border-radius: 16px
                - padding: 12px 16px
                - box-shadow: none
                - height: 64px
              grid:
                - grid-template-areas: '''i n toggle'' ''i l toggle'''
                - grid-template-columns: 36px 1fr 48px
                - grid-template-rows: 1fr 1fr
                - align-items: center
              icon:
                - color: >-
                    [[[ return entity.state === 'open' ? '#b45309' : '#6b6b6b'
                    ]]]
                - width: 22px
              name:
                - color: >-
                    [[[ return entity.state === 'open' ? '#111111' : '#ffffff'
                    ]]]
                - font-size: 13px
                - font-weight: '600'
                - align-self: end
                - justify-self: start
                - margin-bottom: 1px
              label:
                - color: >-
                    [[[ return entity.state === 'open' ? '#b45309' : '#9a9a9a'
                    ]]]
                - font-size: 11px
                - align-self: start
                - justify-self: start
              custom_fields:
                toggle:
                  - align-self: center
                  - justify-self: end
            custom_fields:
              toggle: |
                <div style="
                  width: 42px;
                  height: 24px;
                  border-radius: 12px;
                  background: [[[ entity.state === 'open' ? '#b45309' : '#3a3a3a' ]]];
                  position: relative;
                ">
                  <div style="
                    width: 18px;
                    height: 18px;
                    border-radius: 50%;
                    background: [[[ entity.state === 'open' ? '#1e1e1e' : '#6b6b6b' ]]];
                    position: absolute;
                    top: 3px;
                    left: [[[ entity.state === 'open' ? '21px' : '3px' ]]];
