views:
  - title: Lights
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Permanent Lights
            heading_style: title
          - type: custom:stack-in-card
            mode: vertical
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  overflow: hidden;
                  background: var(--card-background-color);
                }
            cards:
              - type: custom:button-card
                entity: light.permanent_lights
                name: All Permanent Lights
                icon: mdi:lightbulb-group
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
                styles:
                  card:
                    - border-radius: 0
                    - padding: 20px
                    - background: |
                        [[[
                          return states['light.permanent_lights'].state === 'on'
                            ? 'rgba(255, 200, 50, 0.15)'
                            : 'var(--card-background-color)';
                        ]]]
                  icon:
                    - color: |
                        [[[
                          return states['light.permanent_lights'].state === 'on'
                            ? '#ffc832'
                            : 'var(--disabled-color)';
                        ]]]
                    - width: 36px
                  name:
                    - font-size: 15px
                    - font-weight: 600
                  state:
                    - font-size: 12px
                    - color: var(--secondary-text-color)
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-select-card
                    entity: select.permanent_lights_scene
                    name: Scene
                    icon: mdi:palette
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: switch.permanent_lights_music_mode
                    name: Music Mode
                    icon: mdi:music
                    tap_action:
                      action: toggle
                    fill_container: true
              - type: custom:slider-button-card
                entity: number.permanent_lights_music_sensitivity
                name: Music Sensitivity
                icon:
                  icon: mdi:microphone
                slider:
                  direction: left-right
                  background: gradient
                  use_state_color: true
                  show_track: true
                button:
                  tap_action:
                    action: more-info
